<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e Quebra de linha</h1>
    <hr>
    <p>
        Você pode escrever
        de qualquer jeito
        é só deixar dentro
        das tags &lt;p&gt; e &lt;\p&gt; <!-- Less than / Greater than -->
    </p>
    <p>
        Se precisar quebrar a linha <br>
        em algum lugar do parágrafo <br>
        tem que usar a tag &lt;br&gt;.
    </p>
    <h1>Símbolos e Emojis</h1>
    <hr>
    <p>
        Vamos adicionar símbolos:
        &reg; &copy; &trade; &sum; &uparrow; &downarrow; &leftarrow; &rightarrow;
    </p>
    <p>
        Agora são os emojis:
        &#x1F600; &#x1F975; &#x1FAEA; <!-- &#x1[codigo] -->
    </p>
</body>
</html>
